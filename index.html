<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Fit · Reporte Diario de Ventas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; color: #111; min-height: 100vh; }
  .page { max-width: 900px; margin: 0 auto; padding: 24px 16px 40px; }
  .header { background: #111; border-radius: 12px; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { background: #FFB612; border-radius: 8px; padding: 7px 12px; font-weight: 800; font-size: 13px; color: #000; letter-spacing: 0.05em; white-space: nowrap; }
  .header-title { color: #fff; font-size: 20px; font-weight: 700; line-height: 1.2; }
  .header-date { color: #aaa; font-size: 13px; margin-top: 2px; }
  .header-meta { text-align: right; }
  .header-meta-label { color: #aaa; font-size: 12px; }
  .header-meta-val { color: #FFB612; font-size: 28px; font-weight: 700; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn { display: flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid #ccc; background: #fff; color: #555; transition: all 0.15s; }
  .tab-btn .code { font-size: 10px; font-weight: 700; opacity: 0.6; margin-right: 2px; }
  .tab-btn.active { background: #FFB612; border-color: #FFB612; color: #000; }
  .tab-btn:hover:not(.active) { border-color: #999; color: #222; }
  .panel { display: none; }
  .panel.active { display: block; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .kpi-card { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e8e8e8; }
  .kpi-card.dark { background: #111; border-color: #111; }
  .kpi-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #999; text-transform: uppercase; margin-bottom: 6px; }
  .kpi-card.dark .kpi-label { color: #888; }
  .kpi-val { font-size: 26px; font-weight: 700; color: #111; line-height: 1; }
  .kpi-card.dark .kpi-val { color: #FFB612; }
  .kpi-sub { font-size: 12px; margin-top: 4px; font-weight: 500; }
  .kpi-sub.red { color: #e53e3e; } .kpi-sub.green { color: #38a169; } .kpi-sub.gray { color: #888; }
  .progress-section { background: #fff; border-radius: 10px; padding: 16px 18px; border: 1px solid #e8e8e8; margin-bottom: 16px; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-title { font-size: 12px; font-weight: 600; color: #555; }
  .progress-pct { font-size: 13px; font-weight: 700; }
  .progress-pct.green { color: #38a169; } .progress-pct.red { color: #e53e3e; }
  .progress-bar { height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 5px; }
  .fill-green { background: #38a169; } .fill-red { background: #e53e3e; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .compare-card { background: #fff; border-radius: 10px; padding: 14px 18px; border: 1px solid #e8e8e8; }
  .compare-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #999; text-transform: uppercase; margin-bottom: 8px; }
  .compare-main { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .compare-pct { font-size: 26px; font-weight: 700; }
  .compare-pct.green { color: #38a169; } .compare-pct.red { color: #e53e3e; }
  .compare-badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .badge-green { background: #c6f6d5; color: #276749; } .badge-red { background: #fed7d7; color: #9b2c2c; }
  .compare-detail { font-size: 12px; color: #888; }
  .chart-card { background: #fff; border-radius: 10px; padding: 16px 18px; border: 1px solid #e8e8e8; margin-bottom: 16px; }
  .chart-title { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #999; text-transform: uppercase; margin-bottom: 12px; }
  .chart-legend { display: flex; gap: 16px; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: #555; }
  .legend-dot-gold { width: 12px; height: 4px; border-radius: 2px; background: #FFB612; }
  .legend-dot-green { width: 12px; height: 12px; border-radius: 3px; background: #2f855a; }
  .chart-wrap { position: relative; width: 100%; height: 400px; }
  .canal-card { background: #fff; border-radius: 10px; padding: 16px 18px; border: 1px solid #e8e8e8; margin-bottom: 16px; }
  .canal-title { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #999; text-transform: uppercase; margin-bottom: 12px; }
  .canal-table { width: 100%; border-collapse: collapse; }
  .canal-table thead th { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: #aaa; text-transform: uppercase; padding: 0 8px 8px; border-bottom: 1px solid #f0f0f0; text-align: left; }
  .canal-table thead th:not(:first-child) { text-align: right; }
  .canal-table tbody td { padding: 8px 8px; border-bottom: 1px solid #f7f7f7; vertical-align: middle; }
  .canal-table tbody tr:last-child td { border-bottom: none; }
  .canal-name { font-size: 13px; font-weight: 600; color: #222; }
  .canal-bar-col { width: 40%; }
  .bar-bg { background: #f0f0f0; border-radius: 3px; height: 7px; overflow: hidden; }
  .bar-fill { height: 7px; border-radius: 3px; background: #FFB612; }
  .canal-num { font-size: 13px; font-weight: 700; color: #222; text-align: right; white-space: nowrap; }
  .canal-pct { font-size: 12px; color: #888; text-align: right; }
  .canal-var { font-size: 12px; font-weight: 700; text-align: right; white-space: nowrap; }
  .canal-var.up { color: #38a169; } .canal-var.down { color: #e53e3e; }
  .alert-card { border-radius: 10px; padding: 13px 16px; margin-bottom: 10px; border: 1.5px solid #fc8181; background: #fff5f5; display: flex; align-items: flex-start; gap: 10px; }
  .alert-dot-big { width: 11px; height: 11px; border-radius: 50%; background: #e53e3e; margin-top: 2px; flex-shrink: 0; }
  .alert-text { font-size: 13px; color: #333; font-weight: 500; line-height: 1.5; }
  .alert-text strong { color: #c53030; }
  .footer { text-align: center; margin-top: 24px; font-size: 11px; color: #bbb; }
</style>
</head>

s Aires Tranvía", "ventas": 21, "meta": 45, "cumpl": 46.7}]}, "cri": {"nombre": "Costa Rica", "moneda": "USD", "meta_dia": 119, "acum_ventas": 589, "acum_meta": 524, "meta_mes": 3935, "mes_pct": 15.0, "prev_ventas": 316, "py_ventas": 585, "daily": [{"date": "1 Jun", "ventas": 271, "meta": 213}, {"date": "2 Jun", "ventas": 196, "meta": 174}, {"date": "3 Jun", "ventas": 122, "meta": 137}], "canales": [{"n": "Tótem", "a": 383, "p": 162, "y": 126}, {"n": "Web", "a": 161, "p": 140, "y": 339}, {"n": "Recepción", "a": 37, "p": 9, "y": 109}, {"n": "Tu Espacio", "a": 3, "p": 1, "y": 6}, {"n": "App", "a": 5, "p": 4, "y": 5}], "sedes_sin": ["San Sebastián "], "sedes_malas": []}, "pan": {"nombre": "Panamá", "moneda": "USD", "meta_dia": 162, "acum_ventas": 525, "acum_meta": 741, "meta_mes": 4812, "mes_pct": 10.9, "prev_ventas": 252, "py_ventas": 550, "daily": [{"date": "1 Jun", "ventas": 267, "meta": 293}, {"date": "2 Jun", "ventas": 151, "meta": 250}, {"date": "3 Jun", "ventas": 107, "meta": 198}], "canales": [{"n": "Tótem", "a": 245, "p": 79, "y": 43}, {"n": "Web", "a": 149, "p": 126, "y": 363}, {"n": "Recepción", "a": 123, "p": 37, "y": 136}, {"n": "Tu Espacio", "a": 2, "p": 2, "y": 4}, {"n": "App", "a": 6, "p": 8, "y": 4}], "sedes_sin": [], "sedes_malas": [{"sede": "City Plaza Crisol", "ventas": 12, "meta": 33, "cumpl": 36.4}, {"sede": "Costa Verde", "ventas": 28, "meta": 69, "cumpl": 40.6}, {"sede": "Versalles", "ventas": 18, "meta": 40, "cumpl": 45.0}, {"sede": "Atlantic Plaza", "ventas": 12, "meta": 26, "cumpl": 46.2}]}, "per": {"nombre": "Perú", "moneda": "PEN", "meta_dia": 696, "acum_ventas": 3031, "acum_meta": 2851, "meta_mes": 20122, "mes_pct": 15.1, "prev_ventas": 766, "py_ventas": 2781, "daily": [{"date": "1 Jun", "ventas": 1385, "meta": 1182}, {"date": "2 Jun", "ventas": 916, "meta": 903}, {"date": "3 Jun", "ventas": 730, "meta": 766}], "canales": [{"n": "Tótem", "a": 1115, "p": 222, "y": 987}, {"n": "Web", "a": 679, "p": 246, "y": 546}, {"n": "Recepción", "a": 1196, "p": 280, "y": 1184}, {"n": "Tu Espacio", "a": 6, "p": 5, "y": 31}, {"n": "App", "a": 35, "p": 13, "y": 33}], "sedes_sin": ["Parque Las Naciones San Miguel ", "Plaza del Sol Huacho ", "Plaza San Miguel "], "sedes_malas": [{"sede": "Centro - Arequipa", "ventas": 14, "meta": 56, "cumpl": 25.0}, {"sede": "Real Plaza Chiclayo", "ventas": 7, "meta": 23, "cumpl": 30.4}, {"sede": "Plaza del Sol Huacho ", "ventas": 22, "meta": 71, "cumpl": 31.0}, {"sede": "Pizarro - Trujillo", "ventas": 30, "meta": 75, "cumpl": 40.0}, {"sede": "Tottus Huaylas", "ventas": 8, "meta": 18, "cumpl": 44.4}]}};
const META = {"acum_label": "1–3 Jun 2026", "today_label": "4 Jun", "header_sub": "Datos del 1 al 3 de June 2026", "footer_txt": "Smart Fit · Datos al 3 Jun 2026 · Carga 04/06/2026", "prev_mes": "May", "py_mes": "Jun 2025", "cur_mes": "Jun 2026"};
const charts = {};

function N(n) { return n.toLocaleString('es-CO'); }

function buildAlerts(c) {
  const alerts = [];
  const cum = c.acum_meta > 0 ? c.acum_ventas / c.acum_meta * 100 : 0;
  if (cum < 80) alerts.push(`Cumplimiento acumulado MTD: <strong>${cum.toFixed(1)}%</strong> — por debajo del umbral mínimo (80%).`);
  const vsP = c.prev_ventas > 0 ? (c.acum_ventas - c.prev_ventas) / c.prev_ventas * 100 : 0;
  if (vsP < -15) alerts.push(`Caída vs mes anterior: <strong>${vsP.toFixed(1)}%</strong> — supera umbral −15%.`);
  const vsPY = c.py_ventas > 0 ? (c.acum_ventas - c.py_ventas) / c.py_ventas * 100 : 0;
  if (vsPY < -5) alerts.push(`Caída vs año anterior: <strong>${vsPY.toFixed(1)}%</strong> — supera umbral −5%.`);
  c.canales.forEach(cn => {
    if (cn.p > 0) {
      const chg = (cn.a - cn.p) / cn.p * 100;
      if (chg < -15) alerts.push(`Canal <strong>${cn.n}</strong> cayó <strong>${chg.toFixed(1)}%</strong> vs mes anterior.`);
    }
  });
  if (c.sedes_sin.length > 0) alerts.push(`<strong>Sede(s) sin ventas (últimos 3 días):</strong> ${c.sedes_sin.join(', ')}. Verificar operación.`);
  return alerts;
}

function renderPanel(key) {
  const c = DATA[key];
  const el = document.getElementById('panel-' + key);
  const mtdVsMeta = c.acum_ventas - c.acum_meta;
  const mtdPct = c.acum_meta > 0 ? c.acum_ventas / c.acum_meta * 100 : 0;
  const prevPct = c.prev_ventas > 0 ? (c.acum_ventas - c.prev_ventas) / c.prev_ventas * 100 : 0;
  const pyPct   = c.py_ventas   > 0 ? (c.acum_ventas - c.py_ventas)   / c.py_ventas   * 100 : 0;
  const mtdPctColor = mtdPct >= 80 ? 'green' : 'red';
  const alerts = buildAlerts(c);
  const totalCanal = c.canales.reduce((s, x) => s + x.a, 0);
  const maxCanal   = Math.max(...c.canales.map(x => x.a));

  const canalRows = c.canales.map(cn => {
    const barW  = maxCanal > 0 ? Math.round(cn.a / maxCanal * 100) : 0;
    const share = totalCanal > 0 ? (cn.a / totalCanal * 100).toFixed(1) : '0';
    const chg   = cn.p > 0 ? (cn.a - cn.p) / cn.p * 100 : 0;
    const chgY  = cn.y > 0 ? (cn.a - cn.y) / cn.y * 100 : 0;
    const cls   = chg  >= 0 ? 'up' : 'down';
    const clsY  = chgY >= 0 ? 'up' : 'down';
    const str   = (chg  >= 0 ? '▲' : '▼') + Math.abs(chg).toFixed(1)  + '%';
    const strY  = (chgY >= 0 ? '▲' : '▼') + Math.abs(chgY).toFixed(1) + '%';
    return `<tr>
      <td class="canal-name">${cn.n}</td>
      <td class="canal-bar-col"><div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div></td>
      <td class="canal-num">${N(cn.a)}</td>
      <td class="canal-pct">${share}%</td>
      <td class="canal-var ${cls}">${str}</td>
      <td class="canal-var ${clsY}">${strY}</td>
    </tr>`;
  }).join('');

  const alertsHtml = alerts.length
    ? alerts.map(a => `<div class="alert-card"><div class="alert-dot-big"></div><div class="alert-text">${a}</div></div>`).join('')
    : `<div style="font-size:13px;color:#38a169;padding:6px 0;display:flex;align-items:center;gap:6px;"><span>✓</span> Sin alertas activas para este período.</div>`;

  const prevMes = META.prev_mes;

  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card dark">
        <div class="kpi-label">Ventas ${META.acum_label}</div>
        <div class="kpi-val">${N(c.acum_ventas)}</div>
        <div class="kpi-sub gray">acumulado</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Meta ${META.acum_label}</div>
        <div class="kpi-val" style="color:#111">${N(c.acum_meta)}</div>
        <div class="kpi-sub gray">acumulada</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Diferencia</div>
        <div class="kpi-val" style="color:${mtdVsMeta >= 0 ? '#38a169' : '#e53e3e'}">${mtdVsMeta >= 0 ? '+' : ''}${N(mtdVsMeta)}</div>
        <div class="kpi-sub ${mtdPct >= 80 ? 'green' : 'red'}">${mtdPct.toFixed(1)}% cumpl. acum.</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Meta hoy (${META.today_label})</div>
        <div class="kpi-val" style="color:#111">${N(c.meta_dia)}</div>
        <div class="kpi-sub gray">Meta mes: ${N(c.meta_mes)} <span style="color:${c.mes_pct>=80?'#38a169':'#e53e3e'};font-weight:700">${c.mes_pct}%</span></div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">Cumplimiento acumulado (${META.acum_label})</span>
        <span class="progress-pct ${mtdPctColor}">${mtdPct.toFixed(1)}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill ${mtdPct >= 80 ? 'fill-green' : 'fill-red'}" style="width:${Math.min(mtdPct,100).toFixed(0)}%"></div>
      </div>
    </div>

    <div class="compare-grid">
      <div class="compare-card">
        <div class="compare-label">VS mes anterior (igual corte)</div>
        <div class="compare-main">
          <span class="compare-pct ${prevPct >= 0 ? 'green' : 'red'}">${prevPct >= 0 ? '+' : ''}${prevPct.toFixed(1)}%</span>
          <span class="compare-badge ${prevPct >= 0 ? 'badge-green' : 'badge-red'}">${prevPct >= 0 ? '▲' : '▼'} ${META.prev_mes}</span>
        </div>
        <div class="compare-detail">${META.prev_mes}: ${N(c.prev_ventas)} · ${META.cur_mes}: ${N(c.acum_ventas)}</div>
      </div>
      <div class="compare-card">
        <div class="compare-label">VS año anterior (igual corte)</div>
        <div class="compare-main">
          <span class="compare-pct ${pyPct >= 0 ? 'green' : 'red'}">${pyPct >= 0 ? '+' : ''}${pyPct.toFixed(1)}%</span>
          <span class="compare-badge ${pyPct >= 0 ? 'badge-green' : 'badge-red'}">${pyPct >= 0 ? '▲' : '▼'} ${META.py_mes}</span>
        </div>
        <div class="compare-detail">${META.py_mes}: ${N(c.py_ventas)} · ${META.cur_mes}: ${N(c.acum_ventas)}</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Ventas diarias (Barras = Ventas · Línea = Meta)</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot-gold"></div> Meta</div>
        <div class="legend-item"><div class="legend-dot-green"></div> Ventas</div>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-${key}"></canvas>
      </div>
    </div>

    <div class="canal-card">
      <div class="canal-title">Canales MTD · Participación y variación</div>
      <table class="canal-table">
        <thead><tr>
          <th>Canal</th><th></th>
          <th style="text-align:right">Vtas</th>
          <th style="text-align:right">%</th>
          <th style="text-align:right">VS ${META.prev_mes.toUpperCase()}</th>
          <th style="text-align:right">VS ${META.py_mes.toUpperCase()}</th>

        <tbody>${canalRows}</tbody>
      </table>
    </div>

    ${alertsHtml}

    ${c.sedes_malas.length > 0 ? `
    <div style="margin-top:10px;">
      <details>
        <summary style="cursor:pointer;font-size:11px;font-weight:700;color:#e53e3e;text-transform:uppercase;letter-spacing:0.07em;padding:10px 14px;background:#fff5f5;border:1.5px solid #fc8181;border-radius:10px;list-style:none;">
          ⚠️ Top sedes con bajo cumplimiento (&lt;50%) — ${c.sedes_malas.length} sede(s)
        </summary>
        <div style="border:1.5px solid #fc8181;border-top:none;border-radius:0 0 10px 10px;overflow:hidden;">
          <table style="width:100%;border-collapse:collapse;font-size:12px;">
            <thead><tr style="background:#fff5f5;">
              <th style="padding:6px 10px;text-align:left;color:#aaa;font-size:10px;text-transform:uppercase;">Sede</th>
              <th style="padding:6px 10px;text-align:right;color:#aaa;font-size:10px;text-transform:uppercase;">Ventas</th>
              <th style="padding:6px 10px;text-align:right;color:#aaa;font-size:10px;text-transform:uppercase;">Meta</th>
              <th style="padding:6px 10px;text-align:right;color:#aaa;font-size:10px;text-transform:uppercase;">Cumpl.</th>
            </tr></thead>
            <tbody>
              ${c.sedes_malas.map((s,i) => `<tr style="border-top:1px solid #f7f7f7;background:${i%2===0?'#fff':'#fafafa'}">
                <td style="padding:6px 10px;font-weight:500;color:#333">${s.sede}</td>
                <td style="padding:6px 10px;text-align:right">${N(s.ventas)}</td>
                <td style="padding:6px 10px;text-align:right;color:#888">${N(s.meta)}</td>
                <td style="padding:6px 10px;text-align:right;font-weight:700;color:#e53e3e">${s.cumpl}%</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </details>
    </div>` : ''}
  `;

  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
  const daily = c.daily;
  const barColors = daily.map(d => d.ventas >= d.meta ? '#276749' : '#c53030');

  charts[key] = new Chart(document.getElementById('chart-' + key), {
    type: 'bar',
    data: {
      labels: daily.map(d => d.date.replace(' May','').replace(' may','')),
      datasets: [
        { label: 'Ventas', data: daily.map(d => d.ventas), backgroundColor: barColors, borderRadius: 3, order: 2 },
        { label: 'Meta', data: daily.map(d => d.meta), type: 'line', borderColor: '#FFB612', backgroundColor: 'transparent', borderWidth: 2, pointBackgroundColor: '#FFB612', pointRadius: 3, pointBorderColor: '#fff', pointBorderWidth: 1.5, tension: 0.3, order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 58 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('es-CO')}` } },
        datalabels: false
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#999', autoSkip: false, maxRotation: 0 } },
        y: { grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { font: { size: 10 }, color: '#999', callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v } }
      }
    },
    plugins: [ChartDataLabels, {
      id: 'multiLabel',
      afterDatasetsDraw(chart) {
        const ctx2 = chart.ctx;
        const meta0 = chart.getDatasetMeta(0);
        const numDays = daily.length;
        const fontSize = numDays <= 3 ? 20 : numDays <= 7 ? 15 : numDays <= 15 ? 11 : numDays <= 22 ? 8.5 : 7.5;
        const boxH    = numDays <= 3 ? 50 : numDays <= 7 ? 40 : numDays <= 15 ? 32 : numDays <= 22 ? 27 : 25;
        const minBarH = numDays <= 7 ? 30 : 18;
        meta0.data.forEach((bar, i) => {
          const d = daily[i];
          if (!d) return;
          const pct = d.meta > 0 ? Math.round(d.ventas / d.meta * 100) : 0;
          const x = bar.x, top = bar.y, bottom = bar.base, barH = bottom - top;
          ctx2.save();
          ctx2.textAlign = 'center';
          const boxW = Math.max(bar.width - 2, 28);
          const boxYraw = top - boxH - 3;
          const boxY = Math.max(boxYraw, 2);
          const boxX = x - boxW / 2;
          ctx2.fillStyle = '#fff';
          ctx2.beginPath();
          if (ctx2.roundRect) ctx2.roundRect(boxX, boxY, boxW, boxH, 3);
          else ctx2.rect(boxX, boxY, boxW, boxH);
          ctx2.fill();
          ctx2.font = `bold ${fontSize}px sans-serif`; ctx2.fillStyle = '#111';
          ctx2.fillText(d.meta.toLocaleString('es-CO'), x, boxY + boxH * 0.42);
          ctx2.font = `${fontSize - 0.5}px sans-serif`; ctx2.fillStyle = '#777';
          ctx2.fillText(pct + '%', x, boxY + boxH * 0.85);
          if (barH > minBarH) {
            ctx2.font = `bold ${fontSize}px sans-serif`; ctx2.fillStyle = 'rgba(255,255,255,0.95)';
            ctx2.fillText(d.ventas.toLocaleString('es-CO'), x, top + barH / 2 + fontSize * 0.3);
          }
          ctx2.restore();
        });
      }
    }]
  });
}

function showTab(key) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-btn-' + key).classList.add('active');
  document.getElementById('panel-' + key).classList.add('active');
  document.getElementById('header-meta-mes').textContent = DATA[key].meta_mes.toLocaleString('es-CO');
  renderPanel(key);
}

showTab('col');
</script>
</body>
</html>
