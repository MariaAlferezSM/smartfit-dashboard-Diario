// Contraseña del dashboard
const PASS = 'smartfit2026';

function checkPwd() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    showTab('col');
  } else {
    document.getElementById('pwd-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
</script>

function buildAlerts(c) {
  const alerts = [];
  const cum = c.acum_meta > 0 ? c.acum_ventas / c.acum_meta * 100 : 0;
  if (cum < 80) alerts.push(`Cumplimiento acumulado MTD: <strong>${cum.toFixed(1)}%</strong> — por debajo del umbral mínimo (80%).`);
  const vsP = c.prev_ventas > 0 ? (c.acum_ventas - c.prev_ventas) / c.prev_ventas * 100 : 0;
  if (vsP < -15) alerts.push(`Caída vs mes anterior: <strong>${vsP.toFixed(1)}%</strong> — supera umbral −15%.`);
  const vsPY = c.py_ventas > 0 ? (c.acum_ventas - c.py_ventas) / c.py_ventas * 100 : 0;
  if (vsPY < -5) alerts.push(`Caída vs año anterior: <strong>${vsPY.toFixed(1)}%</strong> — supera umbral −5%.`);
  c.canales.forEach(cn => {
    if (cn.p > 0) {
      const chg = (cn.a - cn.p) / cn.p * 100;
      if (chg < -15) alerts.push(`Canal <strong>${cn.n}</strong> cayó <strong>${chg.toFixed(1)}%</strong> vs mes anterior.`);
    }
  });
  if (c.sedes_sin.length > 0) alerts.push(`<strong>Sede(s) sin ventas (últimos 3 días):</strong> ${c.sedes_sin.join(', ')}. Verificar operación.`);
  return alerts;
}

    <div class="canal-card">
      <div class="canal-title">Canales MTD · Participación y variación</div>
      <table class="canal-table">
        <thead><tr>
          <th>Canal</th><th></th>
          <th style="text-align:right">Vtas</th>
          <th style="text-align:right">%</th>
          <th style="text-align:right">VS ${META.prev_mes.toUpperCase()}</th>
          <th style="text-align:right">VS ${META.py_mes.toUpperCase()}</th>
        </tr></thead>
        <tbody>${canalRows}</tbody>
      </table>
    </div>

    ${alertsHtml}

    ${c.sedes_malas.length > 0 ? `
    <div style="margin-top:10px;border:1.5px solid #fc8181;border-radius:10px;overflow:hidden;">
      <div style="background:#fff5f5;padding:10px 14px;display:flex;align-items:center;gap:6px;">
        <div style="width:10px;height:10px;border-radius:50%;background:#e53e3e;flex-shrink:0;"></div>
        <span style="font-size:11px;font-weight:700;color:#e53e3e;text-transform:uppercase;letter-spacing:0.07em;">Top sedes bajo cumplimiento (&lt;50%) — ${c.sedes_malas.length} sede(s)</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:#fff5f5;border-top:1px solid #fecaca;">
          <th style="padding:6px 10px;text-align:left;color:#aaa;font-size:10px;text-transform:uppercase;">Sede</th>
          <th style="padding:6px 10px;text-align:right;color:#aaa;font-size:10px;text-transform:uppercase;">Ventas</th>
          <th style="padding:6px 10px;text-align:right;color:#aaa;font-size:10px;text-transform:uppercase;">Meta</th>
          <th style="padding:6px 10px;text-align:right;color:#aaa;font-size:10px;text-transform:uppercase;">Cumpl.</th>
        </tr></thead>
        <tbody>
          ${c.sedes_malas.map((s,i) => `<tr style="border-top:1px solid #f7f7f7;background:${i%2===0?'#fff':'#fafafa'}">
            <td style="padding:6px 10px;font-weight:500;color:#333">${s.sede}</td>
            <td style="padding:6px 10px;text-align:right">${N(s.ventas)}</td>
            <td style="padding:6px 10px;text-align:right;color:#888">${N(s.meta)}</td>
            <td style="padding:6px 10px;text-align:right;font-weight:700;color:#e53e3e">${s.cumpl}%</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}

    <!-- ── BASE DE CLIENTES ──────────────────────────────────── -->
    <div class="bc-section-header">
      <span class="bc-section-title">📊 Base de Clientes — Histórico</span>
      <div class="bc-section-line"></div>
    </div>

    <!-- KPIs resumen -->
    <div class="bc-kpi-grid">
      <div class="bc-kpi accent">
        <div class="bc-kpi-label">Activos al ${META.acum_label.split('–')[1] || 'ayer'}</div>
        <div class="bc-kpi-val">${N(bc.activos_hoy)}</div>
        <div class="bc-kpi-delta ${bc.activos_delta >= 0 ? 'up' : 'down'}">
          ${bc.activos_delta >= 0 ? '▲' : '▼'} ${N(Math.abs(bc.activos_delta))} (${bc.activos_pct >= 0 ? '+' : ''}${bc.activos_pct}%) vs período anterior
        </div>
      </div>
      <div class="bc-kpi">
        <div class="bc-kpi-label">Cancelados al ${META.acum_label ? META.acum_label.split('–')[1] : 'ayer'}</div>
        <div class="bc-kpi-val" style="color:#e53e3e">${N(bc.cancelados_hoy)}</div>
        <div class="bc-kpi-delta ${bc.cancelados_delta <= 0 ? 'up' : 'down'}">
          ${bc.cancelados_delta >= 0 ? '▲' : '▼'} ${N(Math.abs(bc.cancelados_delta))} (${bc.cancelados_pct >= 0 ? '+' : ''}${bc.cancelados_pct}%) vs período anterior
        </div>
      </div>
      <div class="bc-kpi">
        <div class="bc-kpi-label">Inadimplentes</div>
        <div class="bc-kpi-val" style="color:#e53e3e">${N(bc.inadimplentes_hoy)}</div>
        <div class="bc-kpi-delta ${bc.inadimplentes_delta <= 0 ? 'up' : 'down'}">
          ${bc.inadimplentes_delta >= 0 ? '▲' : '▼'} ${N(Math.abs(bc.inadimplentes_delta))} (${bc.inadimplentes_pct >= 0 ? '+' : ''}${bc.inadimplentes_pct}%) vs período anterior
        </div>
      </div>
    </div>

    <!-- Gráficos históricos: activos (izq) | cancelados + tabla (der) -->
    <div class="bc-charts-grid">
      <div class="bc-chart-card">
        <div class="bc-chart-title">Activos</div>
        <div class="bc-chart-wrap"><canvas id="bc-chart-act-${key}"></canvas></div>
      </div>
      <div class="bc-chart-card" style="display:flex;flex-direction:column">
        <div class="bc-chart-title">Cancelados</div>
        <div class="bc-chart-wrap" style="height:180px"><canvas id="bc-chart-can-${key}"></canvas></div>
        ${Object.keys(bc.can_por_tipo).length > 0 ? `
        <table class="bc-table" style="margin-top:10px">
          <thead><tr>
            <th style="text-align:left">Tipo</th>
            <th>Cantidad</th>
            <th>% del total</th>
          </tr></thead>
          <tbody>
            ${(() => {
              const colores = {'Voluntario':'#000000','Automático':'#63636B','Expulsado':'#E88D35'};
              const total = Object.values(bc.can_por_tipo).reduce((a,b)=>a+b,0);
              return Object.entries(bc.can_por_tipo).map(([tipo, val]) => {
                const pct = total > 0 ? (val/total*100).toFixed(1) : '0';
                return `<tr>
                  <td><span class="bc-tipo-dot" style="background:${colores[tipo]||'#a0aec0'}"></span>${tipo}</td>
                  <td>${N(val)}</td>
                  <td>${pct}%</td>
                </tr>`;
              }).join('') + `<tr style="font-weight:700;border-top:2px solid #f0f0f0">
                <td>Total</td>
                <td>${N(total)}</td>
                <td>100%</td>
              </tr>`;
            })()}
          </tbody>
        </table>` : ''}
      </div>
    </div>

    <!-- Inadimplentes — ancho completo -->
    <div class="bc-chart-card" style="margin-top:8px;margin-bottom:16px">
      <div class="bc-chart-title">Inadimplentes</div>
      <div class="bc-chart-wrap" style="height:180px"><canvas id="bc-chart-ina-${key}"></canvas></div>
    </div>
  `;

  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
  const daily = c.daily;
  const barColors = daily.map(d => d.ventas >= d.meta ? '#276749' : '#c53030');

  charts[key] = new Chart(document.getElementById('chart-' + key), {
    type: 'bar',
    data: {
      labels: daily.map(d => d.date.replace(' May','').replace(' may','')),
      datasets: [
        { label: 'Ventas', data: daily.map(d => d.ventas), backgroundColor: barColors, borderRadius: 3, maxBarThickness: 80, order: 2 },
        { label: 'Meta', data: daily.map(d => d.meta), type: 'line', borderColor: '#FFB612', backgroundColor: 'transparent', borderWidth: 2, pointBackgroundColor: '#FFB612', pointRadius: 3, pointBorderColor: '#fff', pointBorderWidth: 1.5, tension: 0.3, order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 65 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('es-CO')}` } },
        datalabels: false
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#999', autoSkip: false, maxRotation: 0 } },
        y: { grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { font: { size: 10 }, color: '#999', callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v } }
      }
    },
    plugins: [{
      id: 'multiLabel',
      afterDatasetsDraw(chart) {
        const ctx2 = chart.ctx;
        const meta0 = chart.getDatasetMeta(0);
        const numDays = daily.length;
        const fontSize = numDays <= 3 ? 20 : numDays <= 7 ? 15 : numDays <= 15 ? 11 : numDays <= 22 ? 8.5 : 7.5;
        const boxH    = numDays <= 3 ? 50 : numDays <= 7 ? 40 : numDays <= 15 ? 32 : numDays <= 22 ? 27 : 25;
        const minBarH = numDays <= 7 ? 30 : 18;
        meta0.data.forEach((bar, i) => {
          const d = daily[i];
          if (!d) return;
          const pct = d.meta > 0 ? Math.round(d.ventas / d.meta * 100) : 0;
          const x = bar.x, top = bar.y, bottom = bar.base, barH = bottom - top;
          ctx2.save();
          ctx2.textAlign = 'center';
          const boxW = Math.max(bar.width - 2, 28);
          const boxYraw = top - boxH - 3;
          const boxY = Math.max(boxYraw, 2);
          const boxX = x - boxW / 2;
          ctx2.fillStyle = '#fff';
          ctx2.beginPath();
          if (ctx2.roundRect) ctx2.roundRect(boxX, boxY, boxW, boxH, 3);
          else ctx2.rect(boxX, boxY, boxW, boxH);
          ctx2.fill();
          ctx2.font = `bold ${fontSize}px sans-serif`; ctx2.fillStyle = '#111';
          ctx2.fillText(d.meta.toLocaleString('es-CO'), x, boxY + boxH * 0.42);
          ctx2.font = `${fontSize - 0.5}px sans-serif`; ctx2.fillStyle = '#777';
          ctx2.fillText(pct + '%', x, boxY + boxH * 0.85);
          if (barH > minBarH) {
            ctx2.font = `bold ${fontSize}px sans-serif`; ctx2.fillStyle = 'rgba(255,255,255,0.95)';
            ctx2.fillText(d.ventas.toLocaleString('es-CO'), x, top + barH / 2 + fontSize * 0.3);
          }
          ctx2.restore();
        });
      }
    }]
  });

  // ── GRÁFICOS BASE DE CLIENTES ─────────────────────────────────────────────
  const bcChartOpts = (title) => ({
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: true, position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 10 } },
      tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('es-CO')}` } },
      datalabels: false
    },
    scales: {
      x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#999', maxRotation: 0 } },
      y: { grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { font: { size: 9 }, color: '#999', callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v } }
    }
  });

  // Destruir gráficos bc anteriores si existen
  ['act','can','ina'].forEach(t => {
    const cid = 'bc-chart-' + t + '-' + key;
    if (charts[cid]) { charts[cid].destroy(); delete charts[cid]; }
  });

  // Gráfico ACTIVOS — línea con cifras sobre cada punto
  const actLabels = bc.activos_hist.map(p => p.label);
  const actVals   = bc.activos_hist.map(p => p.value);
  charts['bc-chart-act-' + key] = new Chart(
    document.getElementById('bc-chart-act-' + key), {
      type: 'line',
      data: {
        labels: actLabels,
        datasets: [{
          label: 'Activos',
          data: actVals,
          borderColor: '#FFB612',
          backgroundColor: 'rgba(255,182,18,0.12)',
          fill: true,
          borderWidth: 2,
          pointBackgroundColor: '#FFB612',
          pointRadius: 4,
          tension: 0.3
        }]
      },
      options: {
        ...bcChartOpts('Activos'),
        layout: { padding: { top: 28 } },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` Activos: ${ctx.parsed.y.toLocaleString('es-CO')}` } },
          datalabels: {
            display: true,
            anchor: 'top', align: 'top', offset: 4,
            font: { size: 9, weight: 'bold' },
            color: '#555',
            formatter: v => v.toLocaleString('es-CO')
          }
        }
      }
    }
  );

  // Gráfico CANCELADOS — barras apiladas, colores corporativos
  const canColors = {
    'Voluntario': '#000000',
    'Automático': '#63636B',
    'Expulsado':  '#E88D35'
  };
  const canLabelsAll = [...new Set(
    Object.values(bc.cancelados_por_tipo_hist).flatMap(serie => serie.map(p => p.label))
  )].sort();
  const canDatasets = Object.entries(bc.cancelados_por_tipo_hist).map(([tipo, serie]) => {
    const byLabel = Object.fromEntries(serie.map(p => [p.label, p.value]));
    return {
      label: tipo,
      data: canLabelsAll.map(l => byLabel[l] || 0),
      backgroundColor: canColors[tipo] || '#a0aec0',
      borderRadius: 2,
      stack: 'can'
    };
  });
  charts['bc-chart-can-' + key] = new Chart(
    document.getElementById('bc-chart-can-' + key), {
      type: 'bar',
      data: { labels: canLabelsAll, datasets: canDatasets },
      options: {
        ...bcChartOpts('Cancelados'),
        plugins: {
          legend: { display: true, position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 10 } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('es-CO')}` } },
          datalabels: false
        },
        scales: {
          x: { stacked: true, grid: { display: false }, ticks: { font: { size: 9 }, color: '#999', maxRotation: 0 } },
          y: { stacked: true, grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { font: { size: 9 }, color: '#999', callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v } }
        }
      }
    }
  );

  // Gráfico INADIMPLENTES — línea roja con cifras sobre cada punto
  const inaLabels = bc.inadimplentes_hist.map(p => p.label);
  const inaVals   = bc.inadimplentes_hist.map(p => p.value);
  charts['bc-chart-ina-' + key] = new Chart(
    document.getElementById('bc-chart-ina-' + key), {
      type: 'line',
      data: {
        labels: inaLabels,
        datasets: [{
          label: 'Inadimplentes',
          data: inaVals,
          borderColor: '#e53e3e',
          backgroundColor: 'rgba(229,62,62,0.08)',
          fill: true,
          borderWidth: 2,
          pointBackgroundColor: '#e53e3e',
          pointRadius: 4,
          tension: 0.3
        }]
      },
      options: {
        ...bcChartOpts('Inadimplentes'),
        layout: { padding: { top: 28 } },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` Inadimplentes: ${ctx.parsed.y.toLocaleString('es-CO')}` } },
          datalabels: {
            display: true,
            anchor: 'top', align: 'top', offset: 4,
            font: { size: 9, weight: 'bold' },
            color: '#e53e3e',
            formatter: v => v.toLocaleString('es-CO')
          }
        }
      }
    }
  );
  // ── FIN GRÁFICOS BASE DE CLIENTES ─────────────────────────────────────────
}

function showTab(key) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-btn-' + key).classList.add('active');
  document.getElementById('panel-' + key).classList.add('active');
  document.getElementById('header-meta-mes').textContent = DATA[key].meta_mes.toLocaleString('es-CO');
  const mp = DATA[key].mes_pct;
  const pctEl = document.getElementById('header-mes-pct');
  pctEl.textContent = mp + '% cumpl. mes';
  pctEl.style.color = mp >= 80 ? '#4ade80' : '#fc8181';
  renderPanel(key);
}

// Tab inicial se carga después del login
</script>
</body>
</html>
