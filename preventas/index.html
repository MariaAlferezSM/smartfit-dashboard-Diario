<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .header { background: #111; border-radius: 12px; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

  .header-title { color: #fff; font-size: 20px; font-weight: 700; line-height: 1.2; }
  .header-date { color: #aaa; font-size: 13px; margin-top: 2px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab-btn { display: flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid #ccc; background: #fff; color: #555; transition: all 0.15s; }
  .tab-btn .code { font-size: 10px; font-weight: 700; opacity: 0.6; margin-right: 2px; }
  .tab-btn.active { background: #FFB612; border-color: #FFB612; color: #000; }
  .tab-btn:hover:not(.active) { border-color: #999; color: #222; }

  .sede-pills { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .pill-btn { padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #666; }
  .pill-btn.active { background: #111; border-color: #111; color: #FFB612; }
  .pill-btn:hover:not(.active) { border-color: #999; color: #222; }

  .panel { display: none; }
  .panel.active { display: block; }

  .sede-title { font-size: 30px; font-weight: 800; color: #3B3B3B; margin: 4px 0 18px; }

  .kpi-row { display: flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
  .kpi-card { flex: 1 1 210px; background: #000; border-radius: 14px; padding: 16px 18px; min-width: 190px; }
  .kpi-card.single { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 96px; }
  .kpi-card.double .kpi-half { text-align: center; padding: 7px 0; }
  .kpi-card.double .divider { height: 1px; background: #8c8c8c; margin: 2px 18px; opacity: .5; }
  .kpi-label { color: #fff; font-size: 14px; }
  .kpi-value { color: #FFA500; font-size: 25px; font-weight: 800; margin-top: 4px; }

  .legend-row { display: flex; gap: 22px; align-items: center; margin-bottom: 8px; font-size: 13px; color: #333; }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }

  .chart-card { background: #fff; border-radius: 10px; padding: 16px 18px 8px; border: 1px solid #e8e8e8; }
  .chart-wrap { position: relative; width: 100%; height: 430px; }

  .footer { text-align: center; margin-top: 24px; font-size: 11px; color: #999; }
</style>

let paisActual = null;
let sedeActual = 0;
let chartInstance = null;

function N(n) { return (n ?? 0).toLocaleString('es-CO'); }

function mostrarPais(codigo) {
  paisActual = codigo;
  sedeActual = 0;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-btn-' + codigo).classList.add('active');

  const pills = document.getElementById('sede-pills');
  pills.innerHTML = '';
  DATA[codigo].sedes.forEach((s, idx) => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = s.sede;
    btn.onclick = () => seleccionarSede(idx);
    btn.id = 'pill-' + idx;
    pills.appendChild(btn);
  });

  renderSede();
}

function seleccionarSede(idx) {
  sedeActual = idx;
  document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pill-' + idx).classList.add('active');
  renderSede();
}

function renderSede() {
  const bloque = DATA[paisActual];
  if (!bloque || !bloque.sedes.length) return;
  const s = bloque.sedes[sedeActual];
  const k = s.kpis;

  document.getElementById('sede-title').textContent = s.sede;
  document.getElementById('kpi-ventas').textContent = N(k.ventas_totales);
  document.getElementById('kpi-confirmadas').textContent = N(k.confirmadas);
  document.getElementById('kpi-noconfirmados').textContent = N(k.no_confirmados);
  document.getElementById('kpi-cancelados').textContent = N(k.cancelados);
  document.getElementById('kpi-apertura').textContent = k.fecha_apertura || 'N/D';
  document.getElementById('kpi-diaspreventa').textContent = (k.dias_preventa === null || k.dias_preventa === undefined) ? 'N/D' : k.dias_preventa;

  renderChart(s.serie);
}

function renderChart(serie) {
  const ctx = document.getElementById('sedeChart').getContext('2d');
  if (chartInstance) { chartInstance.destroy(); }

  chartInstance = new Chart(ctx, {
    data: {
      labels: serie.labels,
      datasets: [
        {
          type: 'bar',
          label: 'Confirmados',
          data: serie.confirmados,
          backgroundColor: '#FFA500',
          borderRadius: 2,
          order: 2,
          datalabels: {
            color: '#2B2B2B',
            font: { size: 10, weight: 'bold' },
            anchor: 'start',
            align: 'end',
            offset: 2,
            formatter: v => v > 0 ? v : '',
          },
        },
        {
          type: 'bar',
          label: 'Cancelados',
          data: serie.cancelados.map(v => -v),
          backgroundColor: '#D6293E',
          borderRadius: 2,
          order: 2,
          datalabels: {
            color: '#fff',
            font: { size: 10, weight: 'bold' },
            anchor: 'end',
            align: 'end',
            offset: 2,
            formatter: v => v < 0 ? v : '',
          },
        },
        {
          type: 'line',
          label: 'Totales',
          data: serie.totales,
          borderColor: '#1A1A1A',
          backgroundColor: '#1A1A1A',
          pointBackgroundColor: '#1A1A1A',
          pointRadius: 4,
          borderWidth: 2,
          tension: 0.15,
          order: 1,
          datalabels: {
            color: '#fff',
            font: { size: 10, weight: 'bold' },
            backgroundColor: '#595959',
            borderRadius: 4,
            padding: { top: 3, bottom: 3, left: 5, right: 5 },
            anchor: 'end',
            align: 'top',
            offset: 4,
          },
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: true },
        datalabels: { display: true },
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: '#EDEDED' }, ticks: { color: '#595959' } },
      },
    },
    plugins: [ChartDataLabels],
  });
}

if (Object.keys(DATA).length) {
  mostrarPais(Object.keys(DATA)[0]);
}
